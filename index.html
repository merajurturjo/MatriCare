<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatriCare Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-shell">
        <nav class="floating-nav">
            <div class="nav-logo"><div class="logo-box"><i class="fas fa-heart"></i></div></div>
            <div class="nav-links">
                <div class="nav-item active" data-target="home" title="Home"><i class="fas fa-house"></i></div>
                <div class="nav-item" data-target="meds" title="Medications"><i class="fas fa-pills"></i></div>
                <div class="nav-item" data-target="diet" title="Diet & Food"><i class="fas fa-apple-whole"></i></div>
                <div class="nav-item" data-target="blood" title="Blood Donors"><i class="fas fa-drop"></i></div>
                <div class="nav-item" data-target="profile" title="My Profile"><i class="fas fa-user-circle"></i></div>
            </div>
            <div class="nav-footer">
                <div class="nav-item sos" data-target="sos"><i class="fas fa-phone-flip"></i></div>
            </div>
        </nav>

        <main class="main-stage">
            <header class="glass-header">
                <h1 id="view-title">Home</h1>
                <div class="user-pill">
                    <span id="user-display-name">Rowsan Ara Bushra</span>
                    <img src="https://ui-avatars.com/api/?name=Bushra&background=ff4d6d&color=fff" class="user-img">
                </div>
            </header>

            <div class="stage-content">
                
                <section id="home" class="page active">
                    <div class="welcome-card">
                        <h2>Welcome Back!</h2>
                        <p>Keep tracking your health daily for a safe journey.</p>
                    </div>
                </section>

                <section id="meds" class="page">
                    <div class="glass-card">
                        <h3><i class="fas fa-pills"></i> Medicine Reminder</h3>
                        <div class="input-row">
                            <input type="text" id="med-name" placeholder="Medicine Name">
                            <input type="time" id="med-time">
                            <button class="btn-add" onclick="addMed()">Add</button>
                        </div>
                        <div id="med-list" class="list-container"></div>
                    </div>
                </section>

                <section id="diet" class="page">
                    <div class="glass-card">
                        <h3><i class="fas fa-utensils"></i> Daily Diet Plan</h3>
                        <div class="input-row">
                            <select id="meal-type">
                                <option value="Breakfast">Breakfast</option>
                                <option value="Lunch">Lunch</option>
                                <option value="Dinner">Dinner</option>
                                <option value="Snack">Snack</option>
                            </select>
                            <input type="text" id="food-item" placeholder="What did you eat?">
                            <button class="btn-add" onclick="addDiet()">Record</button>
                        </div>
                        <div id="diet-list" class="list-container"></div>
                    </div>
                </section>

                <section id="blood" class="page">
                    <div class="glass-card">
                        <h3><i class="fas fa-drop"></i> Blood Donor Contacts</h3>
                        <div class="input-row">
                            <input type="text" id="donor-name" placeholder="Name">
                            <select id="blood-group">
                                <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                                <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                            </select>
                            <input type="text" id="donor-phone" placeholder="Phone">
                            <button class="btn-add" onclick="addDonor()">Save</button>
                        </div>
                        <div id="donor-list" class="list-container"></div>
                    </div>
                </section>

                <section id="profile" class="page">
                    <div class="glass-card profile-box">
                        <h3>My Profile</h3>
                        <div class="profile-detail">
                            <label>Full Name</label>
                            <input type="text" id="p-name" value="Rowsan Ara Bushra">
                            <label>Blood Group</label>
                            <input type="text" id="p-blood" placeholder="e.g. B+">
                            <label>Emergency Contact</label>
                            <input type="text" id="p-emergency" placeholder="Phone number">
                            <button class="btn-shine" onclick="saveProfile()">Update Profile</button>
                        </div>
                    </div>
                </section>

                <section id="sos" class="page">
                    <div class="sos-card">
                        <i class="fas fa-triangle-exclamation"></i>
                        <h2>Emergency SOS</h2>
                        <button class="sos-btn" onclick="window.location.href='tel:999'">Call Ambulance</button>
                    </div>
                </section>

            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
